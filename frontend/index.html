<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Emotion Recognition</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="container">
    <h1>Speech Emotion Recognition</h1>
    <p class="subtitle">Use your trained notebook model to predict emotion from live voice or WAV upload.</p>

    <section class="card">
      <h2>API Settings</h2>
      <label for="apiBaseUrl">Backend URL</label>
      <input id="apiBaseUrl" type="text" value="http://127.0.0.1:8000" />
      <button id="healthBtn" type="button">Check Health</button>
      <pre id="healthOutput" class="output"></pre>
    </section>

    <section class="card">
      <h2>Predict Emotion</h2>
      <p class="hint">Record 3-8 seconds for better predictions.</p>
      <div class="button-row">
        <button id="startRecordBtn" type="button">Start Recording</button>
        <button id="stopRecordBtn" type="button" disabled>Stop Recording</button>
      </div>
      <audio id="recordingPreview" controls></audio>
      <button id="predictRecordedBtn" type="button" disabled>Predict from Recording</button>
      <hr />
      <label for="audioFile">Or upload WAV file</label>
      <input id="audioFile" type="file" accept=".wav,audio/wav" />
      <button id="predictFileBtn" type="button">Predict from File</button>
      <pre id="predictOutput" class="output"></pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
